name: Generate certificate thumbnails

on:
  push:
    paths:
      - 'certificates/**'

permissions:
  contents: write

jobs:
  thumbnails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Find changed PDFs
        id: find
        run: |
          # If this is the first push (before is all zeros) list all PDFs, otherwise list changed PDFs
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            files=$(git ls-files 'certificates/*.pdf' 'certificates/**/*.pdf' || true)
          else
            files=$(git --no-pager diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^certificates/.*\.(pdf|PDF)$' || true)
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create thumbnails
        run: |
          mkdir -p certificates/thumbnails
          echo "Generating thumbnails for the following files:"
          echo "${{ steps.find.outputs.files }}"
          # Iterate over each file line-by-line to handle spaces in filenames
          printf "%s\n" "${{ steps.find.outputs.files }}" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Processing: [$f]"
              base=$(basename "$f")
              # Preserve the PDF filename exactly (including spaces/case) and replace extension with .jpg
              name="${base%.*}"
              out="certificates/thumbnails/${name}.jpg"
              # Use pdftoppm if available (poppler). pdftoppm will produce a .jpg file when given the base name.
              if command -v pdftoppm >/dev/null 2>&1; then
                pdftoppm -jpeg -singlefile -scale-to 1200 "$f" "${out%.jpg}" || true
              else
                # Fallback to ImageMagick `magick`/`convert` if available
                if command -v magick >/dev/null 2>&1; then
                  magick -density 150 "$f[0]" -quality 85 "$out" || true
                elif command -v convert >/dev/null 2>&1; then
                  convert -density 150 "$f[0]" -quality 85 "$out" || true
                fi
              fi
          done

      - name: Commit and push thumbnails
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add certificates/thumbnails || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: generate certificate thumbnails [skip ci]"
            git pull --rebase origin master
            git push
          else
            echo "No thumbnail changes to commit"
          fi
